apiVersion: apps/v1
kind: Deployment
metadata:
  name: cats-gazing
  namespace: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cats-gazing
  template:
    metadata:
      labels:
        app: cats-gazing
    spec:
      containers:
      - name: cats-gazing
        image: docker.io/andriifedotov/cats-gazing:16f97e2d302023dabc23dbccc646f7eba559a697
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: db-secret
          mountPath: /etc/secrets/db
          readOnly: true
      volumes:
      - name: db-secret
        secret:
          secretName: cats-gazing-db-secret
